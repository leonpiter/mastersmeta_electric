<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>See Electrical lite — Фаза 1</title>
  </head>
  <body>
    <div id="ribbon">
      <div id="ribbon-tabs">
        <button class="rtab rtab-file" type="button" data-menu="file">Файл</button>
        <button class="rtab active" type="button" data-tab="edit">Правка</button>
        <button class="rtab" type="button" data-tab="wire">Соединения</button>
        <button class="rtab" type="button" data-tab="view">Вид</button>
      </div>
      <div id="ribbon-body">
        <div class="rpage" data-tab="edit">
          <div class="rgroup">
            <div class="rgroup-tools">
              <button id="undo" type="button" title="Отменить (Ctrl+Z)">
                <svg class="ic" viewBox="0 0 16 16" fill="none">
                  <path d="M6 4 3 7l3 3" />
                  <path d="M3 7h7a3 3 0 0 1 0 6H7" />
                </svg>
                <span>Отменить</span>
              </button>
              <button id="redo" type="button" title="Вернуть (Ctrl+Y)">
                <svg class="ic" viewBox="0 0 16 16" fill="none">
                  <path d="M10 4l3 3-3 3" />
                  <path d="M13 7H6a3 3 0 0 0 0 6h3" />
                </svg>
                <span>Вернуть</span>
              </button>
            </div>
            <div class="rgroup-cap">Отмена</div>
          </div>
          <div class="rgroup">
            <div class="rgroup-tools">
              <button
                id="rotate"
                type="button"
                title="Повернуть выбранный / ориентацию вставки (R)"
              >
                <svg class="ic" viewBox="0 0 16 16" fill="none">
                  <path d="M12.5 7A5 5 0 1 0 13 9.5" />
                  <path d="M12.5 3.5V7H9" />
                </svg>
                <span>Поворот</span>
              </button>
              <button id="mirror" type="button" title="Отразить (M)">
                <svg class="ic" viewBox="0 0 16 16" fill="none">
                  <path d="M8 2v12" stroke-dasharray="1.5 1.5" />
                  <path d="M6 4 2 8l4 4z" fill="currentColor" />
                  <path d="M10 4l4 4-4 4z" fill="currentColor" />
                </svg>
                <span>Зеркало</span>
              </button>
              <button id="delete" type="button" title="Удалить выбранный (Del)">
                <svg class="ic" viewBox="0 0 16 16" fill="none">
                  <path d="M3 4h10" />
                  <path d="M6 4V2.5h4V4" />
                  <path d="M4.6 4l.7 9.5h5.4L11.4 4" />
                </svg>
                <span>Удалить</span>
              </button>
            </div>
            <div class="rgroup-cap">Элемент</div>
          </div>
        </div>

        <div class="rpage" data-tab="wire" hidden>
          <div class="rgroup">
            <div class="rgroup-tools">
              <button
                id="wire-1"
                type="button"
                title="Провод (1-Wire): клики задают точки, Esc — завершить"
              >
                <svg class="ic" viewBox="0 0 16 16" fill="none">
                  <path d="M2 12H8V4h6" />
                  <circle cx="2" cy="12" r="1.3" fill="currentColor" />
                  <circle cx="14" cy="4" r="1.3" fill="currentColor" />
                </svg>
                <span>Провод</span>
              </button>
            </div>
            <div class="rgroup-cap">Соединения</div>
          </div>
        </div>

        <div class="rpage" data-tab="view" hidden>
          <div class="rgroup">
            <div class="rgroup-tools">
              <button id="reset" type="button" title="Вписать лист в окно">
                <svg class="ic" viewBox="0 0 16 16" fill="none">
                  <path d="M6 6 3 3m0 0v3m0-3h3" />
                  <path d="M10 6l3-3m0 0v3m0-3h-3" />
                  <path d="M6 10l-3 3m0 0v-3m0 3h3" />
                  <path d="M10 10l3 3m0 0v-3m0 3h-3" />
                </svg>
                <span>Вписать</span>
              </button>
            </div>
            <div class="rgroup-cap">Масштаб</div>
          </div>
          <div class="rgroup">
            <div class="rgroup-tools">
              <button id="grid" type="button" title="Показать/скрыть клетку">
                <svg class="ic" viewBox="0 0 16 16" fill="none">
                  <rect x="2.5" y="2.5" width="11" height="11" />
                  <path d="M6 2.5v11M9.5 2.5v11M2.5 6h11M2.5 9.5h11" />
                </svg>
                <span>Сетка</span>
              </button>
            </div>
            <div class="rgroup-cap">Отображение</div>
          </div>
          <div class="rgroup">
            <div class="rgroup-tools">
              <button id="swap" type="button" title="Поменять боковые панели местами">
                <svg class="ic" viewBox="0 0 16 16" fill="none">
                  <path d="M3 6h8" />
                  <path d="M9 4l2 2-2 2" />
                  <path d="M13 10H5" />
                  <path d="M7 8l-2 2 2 2" />
                </svg>
                <span>Панели</span>
              </button>
            </div>
            <div class="rgroup-cap">Панели</div>
          </div>
        </div>
      </div>
    </div>
    <div id="project" class="panel"></div>
    <div id="library" class="panel"></div>
    <div id="split-left" class="splitter" title="Потяните, чтобы изменить ширину"></div>
    <div id="split-right" class="splitter" title="Потяните, чтобы изменить ширину"></div>
    <div id="hud">
      <span id="hud-info"></span>
      <span id="hud-cells">
        <span class="cell">ПРИВЯЗКА 5 ММ</span>
        <span class="cell">ЕСКД · ГОСТ</span>
      </span>
    </div>
    <svg id="canvas"></svg>

    <div id="file-menu" class="dropdown" hidden>
      <button class="dd-item" type="button" disabled title="Будет в следующих версиях">
        Создать…
      </button>
      <button class="dd-item" type="button" disabled title="Будет в следующих версиях">
        Открыть…
      </button>
      <div class="dd-sep"></div>
      <button class="dd-item" type="button" disabled title="Будет в следующих версиях">
        Сохранить
      </button>
      <button class="dd-item" type="button" disabled title="Будет в следующих версиях">
        Сохранить как…
      </button>
      <div class="dd-sep"></div>
      <button class="dd-item" id="pdf" type="button">Экспорт в PDF</button>
    </div>

    <div id="grid-menu" class="dropdown" hidden>
      <label class="dd-check"
        ><input type="checkbox" id="grid-show" checked /> Показать сетку</label
      >
      <div class="dd-sep"></div>
      <div class="dd-title">Шаг сетки</div>
      <button class="dd-item" type="button" data-step="1">1 мм</button>
      <button class="dd-item" type="button" data-step="2.5">2,5 мм</button>
      <button class="dd-item" type="button" data-step="5">5 мм</button>
      <button class="dd-item" type="button" data-step="10">10 мм</button>
    </div>

    <dialog id="props">
      <form id="props-form" method="dialog">
        <h3>Свойства элемента</h3>
        <div class="prop-row">
          <label for="prop-desig">Позобозначение</label>
          <input id="prop-desig" type="text" autocomplete="off" />
        </div>
        <div id="prop-type" class="prop-type"></div>
        <label class="prop-check">
          <input id="prop-showlabels" type="checkbox" /> Показывать подпись
        </label>
        <div class="prop-actions">
          <button value="cancel" type="submit" class="btn-secondary">Отмена</button>
          <button value="ok" type="submit" id="prop-ok">OK</button>
        </div>
      </form>
    </dialog>

    <dialog id="project-settings">
      <form method="dialog" class="modal-form">
        <h3>Настройки проекта</h3>
        <div class="prop-row">
          <label for="ps-name">Наименование проекта</label>
          <input id="ps-name" type="text" autocomplete="off" />
        </div>
        <div class="prop-row">
          <label for="ps-standard">Стандарт оформления</label>
          <input id="ps-standard" type="text" value="ГОСТ ЕСКД" disabled />
        </div>
        <div class="prop-type" id="ps-info"></div>
        <div class="prop-actions">
          <button value="cancel" type="submit" class="btn-secondary">Отмена</button>
          <button value="ok" type="submit">OK</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
