<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>See Electrical lite — Фаза 1</title>
  </head>
  <body>
    <div id="ribbon">
      <div id="ribbon-tabs">
        <button class="rtab active" type="button" data-tab="home">Главная</button>
        <button class="rtab" type="button" data-tab="view">Вид</button>
        <button class="rtab" type="button" data-tab="file">Файл</button>
      </div>
      <div id="ribbon-body">
        <div class="rpage" data-tab="home">
          <div class="rgroup">
            <div class="rgroup-tools">
              <button id="undo" type="button" title="Отменить (Ctrl+Z)">Отменить</button>
              <button id="redo" type="button" title="Вернуть (Ctrl+Y)">Вернуть</button>
            </div>
            <div class="rgroup-cap">Правка</div>
          </div>
          <div class="rgroup">
            <div class="rgroup-tools">
              <button id="rotate" type="button" title="Повернуть выбранный / ориентацию вставки (R)">Поворот</button>
              <button id="mirror" type="button" title="Отразить (M)">Зеркало</button>
              <button id="delete" type="button" title="Удалить выбранный (Del)">Удалить</button>
            </div>
            <div class="rgroup-cap">Элемент</div>
          </div>
        </div>

        <div class="rpage" data-tab="view" hidden>
          <div class="rgroup">
            <div class="rgroup-tools">
              <button id="reset" type="button" title="Вписать лист в окно">Вписать лист</button>
            </div>
            <div class="rgroup-cap">Масштаб</div>
          </div>
          <div class="rgroup">
            <div class="rgroup-tools">
              <button id="grid" type="button" title="Показать/скрыть клетку">Сетка</button>
            </div>
            <div class="rgroup-cap">Отображение</div>
          </div>
          <div class="rgroup">
            <div class="rgroup-tools">
              <button id="swap" type="button" title="Поменять боковые панели местами">Поменять панели</button>
            </div>
            <div class="rgroup-cap">Панели</div>
          </div>
        </div>

        <div class="rpage" data-tab="file" hidden>
          <div class="rgroup">
            <div class="rgroup-tools">
              <button id="pdf" type="button" title="Экспорт листа в PDF">Экспорт PDF</button>
            </div>
            <div class="rgroup-cap">Печать / экспорт</div>
          </div>
        </div>
      </div>
    </div>
    <div id="project" class="panel"></div>
    <div id="library" class="panel"></div>
    <div id="split-left" class="splitter" title="Потяните, чтобы изменить ширину"></div>
    <div id="split-right" class="splitter" title="Потяните, чтобы изменить ширину"></div>
    <div id="hud">
      <span id="hud-info"></span>
      <span id="hud-cells">
        <span class="cell">ПРИВЯЗКА 5 ММ</span>
        <span class="cell">ЕСКД · ГОСТ</span>
      </span>
    </div>
    <svg id="canvas"></svg>

    <dialog id="props">
      <form id="props-form" method="dialog">
        <h3>Свойства элемента</h3>
        <div class="prop-row">
          <label for="prop-desig">Позобозначение</label>
          <input id="prop-desig" type="text" autocomplete="off" />
        </div>
        <div id="prop-type" class="prop-type"></div>
        <label class="prop-check">
          <input id="prop-showlabels" type="checkbox" /> Показывать подпись
        </label>
        <div class="prop-actions">
          <button value="cancel" type="submit" class="btn-secondary">Отмена</button>
          <button value="ok" type="submit" id="prop-ok">OK</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
