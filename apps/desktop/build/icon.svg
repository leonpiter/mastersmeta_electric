<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3a9bf0"/>
      <stop offset="0.55" stop-color="#1668b8"/>
      <stop offset="1" stop-color="#0d3f73"/>
    </linearGradient>
    <linearGradient id="bevel" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.18"/>
    </linearGradient>
  </defs>

  <!-- корпус-плитка (в духе QElectroTech: синий, мягкие углы) -->
  <rect x="0" y="0" width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="108" fill="url(#bevel)"/>
  <rect x="6" y="6" width="500" height="500" rx="102" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="3"/>

  <!-- схемный мотив: литера «М» из проводов с узлами/клеммами цепи -->
  <g fill="none" stroke="#ffffff" stroke-width="30" stroke-linecap="round" stroke-linejoin="round">
    <!-- левая стойка + верхний/нижний вывод -->
    <path d="M150 150 V362"/>
    <!-- правая стойка -->
    <path d="M362 150 V362"/>
    <!-- средняя «галочка» (V) — две диагонали в общий узел -->
    <path d="M150 150 L256 292"/>
    <path d="M362 150 L256 292"/>
  </g>

  <!-- клеммы (контактные точки схемы) на концах проводов -->
  <g fill="#ffffff">
    <circle cx="150" cy="150" r="20"/>
    <circle cx="362" cy="150" r="20"/>
  </g>
  <!-- центральный узел-соединение -->
  <circle cx="256" cy="292" r="17" fill="#0d3f73" stroke="#ffffff" stroke-width="11"/>

  <!-- нижние выводы-стойки с открытыми клеммами (электрические присоединения) -->
  <g fill="none" stroke="#ffffff" stroke-width="30" stroke-linecap="round">
    <path d="M150 362 V392"/>
    <path d="M362 362 V392"/>
  </g>
  <g fill="#0d3f73" stroke="#ffffff" stroke-width="11">
    <circle cx="150" cy="392" r="16"/>
    <circle cx="362" cy="392" r="16"/>
  </g>
</svg>
